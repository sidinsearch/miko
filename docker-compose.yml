version: '3.8'

services:
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: vertx-api-gateway:latest
    container_name: vertx-api-gateway
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - REQUEST_TIMEOUT_MS=5000
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/aggregate || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
